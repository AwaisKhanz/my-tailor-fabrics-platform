name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Create Runtime Env Files
      run: npm run env:setup

    - name: Verify Environment Contract
      run: npm run env:verify

    - name: Generate Prisma Client
      run: npm run prisma:generate --workspace api

    - name: Build All Workspaces
      run: npm run build

    - name: Lint Check
      run: npm run lint

    - name: Build API Docker Image
      run: docker build -f Dockerfile.api .

    - name: Build Web Docker Image
      run: docker build --build-arg NEXT_PUBLIC_API_URL=/backend -f Dockerfile.web .
