name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'pnpm'

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.18.3

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Create Runtime Env Files
      run: pnpm run env:setup

    - name: Verify Environment Contract
      run: pnpm run env:verify

    - name: Generate Prisma Client
      run: pnpm run prisma:generate

    - name: Build All Workspaces
      run: pnpm run build

    - name: Lint Check
      run: pnpm run lint

    - name: Build API Docker Image
      run: docker build -f Dockerfile.api .

    - name: Build Web Docker Image
      run: docker build --build-arg NEXT_PUBLIC_API_URL=/backend -f Dockerfile.web .
